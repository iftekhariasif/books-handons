services:
  dvwa:
    image: ghcr.io/digininja/dvwa:latest
    container_name: dvwa
    ports:
      - "8080:80"
    depends_on:
      - db
    environment:
      - DB_SERVER=db
      - DB_DATABASE=dvwa
      - DB_USER=dvwa
      - DB_PASSWORD=dvwa
    networks:
      - dvwa-net
    restart: unless-stopped

  db:
    image: mariadb:10.11
    container_name: dvwa-db
    environment:
      - MYSQL_ROOT_PASSWORD=dvwa
      - MYSQL_DATABASE=dvwa
      - MYSQL_USER=dvwa
      - MYSQL_PASSWORD=dvwa
    volumes:
      - dvwa-db-data:/var/lib/mysql
    networks:
      - dvwa-net
    restart: unless-stopped

volumes:
  dvwa-db-data:

networks:
  dvwa-net:
